<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Administration - Administration Le Plessis</title>
  <link rel="icon" href="../images/favicon.ico" type="image/x-icon">
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen font-sans">
  <div class="max-w-5xl mx-auto bg-white shadow-md rounded-lg p-6 mt-8">
    <h1 class="text-3xl font-bold text-center mb-8">🧰 Panneau d'administration</h1>

    <!-- ===================== ACTUALITÉS ===================== -->
    <section class="mb-16">
      <h2 class="text-2xl font-semibold text-gray-800 mb-4 border-b pb-2">📢 Gestion des Actualités</h2>

      <form id="newsForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <input type="hidden" id="editIndex" value="">

        <div class="col-span-2">
          <label class="block font-semibold mb-1">Titre</label>
          <input id="newsTitle" type="text" class="w-full border p-2 rounded" placeholder="Titre de l’actualité" required>
        </div>

        <div>
          <label class="block font-semibold mb-1">Lien (site ou PDF)</label>
          <input id="newsLink" type="text" class="w-full border p-2 rounded" placeholder="https://... ou documents/nom.pdf" required>
        </div>

        <div>
          <label class="block font-semibold mb-1">Type de lien</label>
          <select id="newsType" class="w-full border p-2 rounded">
            <option value="link">Lien externe</option>
            <option value="download">Téléchargement PDF</option>
          </select>
        </div>

        <div>
          <label class="block font-semibold mb-1">Image</label>
          <input id="newsImage" type="text" class="w-full border p-2 rounded" placeholder="images/news/nom-image.jpg" required>
          <p class="text-xs text-gray-500 mt-1">→ L’image doit être dans <strong>/images/news/</strong></p>
        </div>

        <div>
          <label class="block font-semibold mb-1">Texte du bouton</label>
          <input id="newsBtnText" type="text" class="w-full border p-2 rounded" value="En savoir plus" required>
        </div>

        <div class="col-span-2">
          <label class="block font-semibold mb-1">Description</label>
          <textarea id="newsDescription" rows="3" class="w-full border p-2 rounded" placeholder="Courte description..." required></textarea>
        </div>

        <div class="col-span-2 flex gap-3 mt-4">
          <button type="submit" id="saveBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:opacity-90 transition">➕ Ajouter</button>
          <button type="button" id="cancelEdit" class="hidden bg-gray-500 text-white px-4 py-2 rounded hover:opacity-90 transition">Annuler</button>
          <button type="button" id="exportNewsBtn" class="ml-auto bg-green-600 text-white px-4 py-2 rounded hover:opacity-90 transition">⬇️ Exporter JSON</button>
        </div>
      </form>

      <div id="newsList" class="grid gap-4"></div>
    </section>

    <!-- ===================== PDF ===================== -->
    <section>
      <h2 class="text-2xl font-semibold text-gray-800 mb-4 border-b pb-2">📄 Gestion des documents PDF</h2>

      <form id="pdfForm" class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
        <input type="hidden" id="editPdfIndex" value="">

        <div>
          <label class="block font-semibold mb-1">Nom du document</label>
          <input id="pdfTitle" type="text" class="w-full border p-2 rounded" placeholder="Ex : Carte Snacking" required>
        </div>

        <div>
          <label class="block font-semibold mb-1">Chemin du fichier</label>
          <input id="pdfPath" type="text" class="w-full border p-2 rounded" placeholder="documents/nom-du-fichier.pdf" required>
        </div>

        <div class="col-span-2 flex gap-3 mt-4">
          <button type="submit" id="savePdfBtn" class="bg-green-600 text-white px-4 py-2 rounded hover:opacity-90 transition">➕ Ajouter</button>
          <button type="button" id="cancelPdfEdit" class="hidden bg-gray-500 text-white px-4 py-2 rounded hover:opacity-90 transition">Annuler</button>
          <button type="button" id="exportPdfBtn" class="ml-auto bg-green-600 text-white px-4 py-2 rounded hover:opacity-90 transition">⬇️ Exporter JSON</button>
        </div>
      </form>

      <div id="pdfList" class="grid gap-4"></div>
    </section>
  </div>

  <script>
    // ================================================================
    // === ACTUALITÉS ===
    const newsListEl = document.getElementById("newsList");
    let newsData = JSON.parse(localStorage.getItem("newsData") || "[]");

    function renderNews() {
      newsListEl.innerHTML = newsData.length
        ? ""
        : '<p class="text-gray-500 italic">Aucune actualité enregistrée.</p>';
      newsData.forEach((n, i) => {
        const div = document.createElement("div");
        div.className = "flex flex-col md:flex-row bg-gray-50 border rounded-lg shadow-sm overflow-hidden";
        div.innerHTML = `
          <img src="${n.image}" alt="${n.titre}" class="w-full md:w-48 h-32 object-cover">
          <div class="flex-1 p-4">
            <h3 class="font-semibold text-lg text-gray-800">${n.titre}</h3>
            <p class="text-sm text-gray-600 mb-1 truncate">${n.lien}</p>
            <p class="text-xs text-gray-500 italic">${n.typeLien === 'download' ? 'Téléchargement PDF' : 'Lien externe'}</p>
            <p class="text-sm text-gray-700 mt-2">${n.description}</p>
            <div class="mt-3 flex gap-2">
              <button onclick="editNews(${i})" class="bg-blue-500 text-white px-3 py-1 rounded hover:opacity-90">Modifier</button>
              <button onclick="deleteNews(${i})" class="bg-red-600 text-white px-3 py-1 rounded hover:opacity-90">Supprimer</button>
            </div>
          </div>`;
        newsListEl.appendChild(div);
      });
    }
    renderNews();

    const newsForm = document.getElementById("newsForm");
    newsForm.addEventListener("submit", e => {
      e.preventDefault();
      const actu = {
        titre: document.getElementById("newsTitle").value,
        lien: document.getElementById("newsLink").value,
        image: document.getElementById("newsImage").value,
        typeLien: document.getElementById("newsType").value,
        texteBouton: document.getElementById("newsBtnText").value,
        description: document.getElementById("newsDescription").value
      };
      const i = document.getElementById("editIndex").value;
      if (i !== "") newsData[i] = actu;
      else newsData.push(actu);
      localStorage.setItem("newsData", JSON.stringify(newsData));
      newsForm.reset();
      document.getElementById("editIndex").value = "";
      document.getElementById("saveBtn").textContent = "➕ Ajouter";
      document.getElementById("cancelEdit").classList.add("hidden");
      renderNews();
    });

    window.editNews = i => {
      const n = newsData[i];
      document.getElementById("newsTitle").value = n.titre;
      document.getElementById("newsLink").value = n.lien;
      document.getElementById("newsImage").value = n.image;
      document.getElementById("newsType").value = n.typeLien;
      document.getElementById("newsBtnText").value = n.texteBouton;
      document.getElementById("newsDescription").value = n.description;
      document.getElementById("editIndex").value = i;
      document.getElementById("saveBtn").textContent = "💾 Enregistrer";
      document.getElementById("cancelEdit").classList.remove("hidden");
      window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.deleteNews = i => {
      if (confirm("Supprimer cette actualité ?")) {
        newsData.splice(i, 1);
        localStorage.setItem("newsData", JSON.stringify(newsData));
        renderNews();
      }
    };

    document.getElementById("cancelEdit").addEventListener("click", () => {
      newsForm.reset();
      document.getElementById("editIndex").value = "";
      document.getElementById("saveBtn").textContent = "➕ Ajouter";
      document.getElementById("cancelEdit").classList.add("hidden");
    });

    document.getElementById("exportNewsBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(newsData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "actualites.json";
      a.click();
      URL.revokeObjectURL(url);
    });

    // ================================================================
    // === PDF ===
    const pdfListEl = document.getElementById("pdfList");
    let pdfData = JSON.parse(localStorage.getItem("pdfData") || "[]");

    function renderPdf() {
      pdfListEl.innerHTML = pdfData.length
        ? ""
        : '<p class="text-gray-500 italic">Aucun PDF enregistré.</p>';
      pdfData.forEach((p, i) => {
        const div = document.createElement("div");
        div.className = "flex justify-between items-center bg-gray-50 border rounded-lg shadow-sm p-4";
        div.innerHTML = `
          <div>
            <h3 class="font-semibold text-lg text-gray-800">${p.nom}</h3>
            <p class="text-sm text-gray-600">${p.chemin}</p>
          </div>
          <div class="flex gap-2">
            <button onclick="editPdf(${i})" class="bg-blue-500 text-white px-3 py-1 rounded hover:opacity-90">Modifier</button>
            <button onclick="deletePdf(${i})" class="bg-red-600 text-white px-3 py-1 rounded hover:opacity-90">Supprimer</button>
          </div>`;
        pdfListEl.appendChild(div);
      });
    }
    renderPdf();

    const pdfForm = document.getElementById("pdfForm");
    pdfForm.addEventListener("submit", e => {
      e.preventDefault();
      const pdf = {
        nom: document.getElementById("pdfTitle").value,
        chemin: document.getElementById("pdfPath").value
      };
      const i = document.getElementById("editPdfIndex").value;
      if (i !== "") pdfData[i] = pdf;
      else pdfData.push(pdf);
      localStorage.setItem("pdfData", JSON.stringify(pdfData));
      pdfForm.reset();
      document.getElementById("editPdfIndex").value = "";
      document.getElementById("savePdfBtn").textContent = "➕ Ajouter";
      document.getElementById("cancelPdfEdit").classList.add("hidden");
      renderPdf();
    });

    window.editPdf = i => {
      const p = pdfData[i];
      document.getElementById("pdfTitle").value = p.nom;
      document.getElementById("pdfPath").value = p.chemin;
      document.getElementById("editPdfIndex").value = i;
      document.getElementById("savePdfBtn").textContent = "💾 Enregistrer";
      document.getElementById("cancelPdfEdit").classList.remove("hidden");
      window.scrollTo({ top: document.body.scrollHeight, behavior: "smooth" });
    };

    window.deletePdf = i => {
      if (confirm("Supprimer ce document ?")) {
        pdfData.splice(i, 1);
        localStorage.setItem("pdfData", JSON.stringify(pdfData));
        renderPdf();
      }
    };

    document.getElementById("cancelPdfEdit").addEventListener("click", () => {
      pdfForm.reset();
      document.getElementById("editPdfIndex").value = "";
      document.getElementById("savePdfBtn").textContent = "➕ Ajouter";
      document.getElementById("cancelPdfEdit").classList.add("hidden");
    });

    document.getElementById("exportPdfBtn").addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(pdfData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "documents.json";
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
